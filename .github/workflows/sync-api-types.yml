name: Sync API types

# Regenerate src/lib/api-types.ts from the backend's OpenAPI spec and open a PR when it
# changes, so the frontend's types can't drift from the API.
#
# Triggered mainly by the backend: on a push to its main that changes openapi.yaml, the
# backend fires a repository_dispatch (event type "openapi-updated"). Also runnable by
# hand, plus a weekly safety-net run in case a dispatch is ever missed.
#
# The PR step needs "Allow GitHub Actions to create and approve pull requests" enabled
# under Settings → Actions → General.

on:
  repository_dispatch:
    types: [openapi-updated]
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — safety net

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-api-types
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Generate types from the backend OpenAPI spec
        run: npm run gen:api

      - name: Open a PR if the types changed
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/sync-api-types
          delete-branch: true
          commit-message: "Regenerate API types from the backend OpenAPI spec"
          title: "Regenerate API types from the backend OpenAPI spec"
          body: |
            The backend's OpenAPI spec changed, so `src/lib/api-types.ts` was regenerated.

            Source: https://github.com/SouhaibBenFarhat/portfolio-backend/blob/main/openapi.yaml

            Auto-generated by the **Sync API types** workflow — review and merge to adopt the new contract.
          labels: automated, dependencies
