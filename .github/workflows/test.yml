name: Tests

# Type-checks, runs the Vitest suite, and builds on every PR and on pushes to main. Kept separate
# from the deploy workflow so a red check is visible on the PR, before it can reach main. `astro build`
# transpiles but does NOT fail on type errors, so the explicit `astro check` step is what guards types.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
