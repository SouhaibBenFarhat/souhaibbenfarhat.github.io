name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Fired by a project repo (easy-apply, code-lobby, gitswitch, easy-copy) when it publishes a
  # release. The Showcase cards are baked from each project's live OG tags at build time
  # (src/lib/og.ts), so refreshing a card means rebuilding this site — that's what this trigger
  # is for. Send it with:
  #   gh api repos/SouhaibBenFarhat/souhaibbenfarhat.github.io/dispatches \
  #     -f event_type=showcase-updated
  repository_dispatch:
    types: [showcase-updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        env:
          # Turns analytics ON — only ever set here, in the production deploy.
          PUBLIC_ENABLE_ANALYTICS: 'true'
          # PostHog project key (public). Set as a repo variable: Settings → Secrets and variables → Actions → Variables.
          PUBLIC_POSTHOG_KEY: ${{ vars.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ vars.PUBLIC_POSTHOG_HOST || 'https://eu.i.posthog.com' }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
