name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Fired by a project repo (easy-apply, code-lobby, gitswitch, easy-copy) when its landing
  # page changes. The Showcase cards are baked from each project's live OG tags at build time
  # (src/lib/og.ts), so refreshing a card means rebuilding this site. Send it with:
  #   gh api repos/SouhaibBenFarhat/souhaibbenfarhat.github.io/dispatches \
  #     -f event_type=showcase-updated
  # This is the fast path (~1 min), but it needs a PAT in each project repo. The schedule below
  # is the fallback that needs no secret at all, so the cards self-heal either way.
  repository_dispatch:
    types: [showcase-updated]
  # Daily rebuild, so a project's new OG tags reach the Showcase without anyone wiring up a
  # token. Runs on the built-in GITHUB_TOKEN — no secret to create, nothing to rotate. 05:00 UTC
  # is off-peak for Actions, which makes a queued run less likely.
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        env:
          # Turns analytics ON — only ever set here, in the production deploy.
          PUBLIC_ENABLE_ANALYTICS: 'true'
          # PostHog project key (public). Set as a repo variable: Settings → Secrets and variables → Actions → Variables.
          PUBLIC_POSTHOG_KEY: ${{ vars.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ vars.PUBLIC_POSTHOG_HOST || 'https://eu.i.posthog.com' }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
